<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="Haevian builds software for consequential environments.">
    <title>Haevian</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
        color: #101312;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100svh;
        overflow: hidden;
        background: #fff;
      }

      .field {
        position: fixed;
        inset: 0;
        background-image: radial-gradient(circle, rgba(35, 45, 42, 0.16) 0.8px, transparent 1px);
        background-position: center;
        background-size: 21px 21px;
      }

      .field::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, rgba(27, 37, 34, 0.28) 0.8px, transparent 1px);
        background-position: center;
        background-size: 21px 21px;
        -webkit-mask-image: radial-gradient(circle at center, #000 0%, rgba(0, 0, 0, 0.72) 22%, transparent 58%);
        mask-image: radial-gradient(circle at center, #000 0%, rgba(0, 0, 0, 0.72) 22%, transparent 58%);
      }

      .vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle, transparent 42%, rgba(255, 255, 255, 0.58) 115%);
      }

      main {
        position: relative;
        z-index: 1;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 2rem;
        pointer-events: none;
      }

      .identity {
        width: min(44vw, 11.5rem);
      }

      .identity img {
        display: block;
        width: 100%;
        height: auto;
        opacity: 1;
        filter: invert(1);
      }

    </style>
  </head>
  <body>
    <div class="field" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <main>
      <div class="identity">
        <img src="logo-white.svg" alt="Haevian">
      </div>
    </main>
  </body>
</html>
